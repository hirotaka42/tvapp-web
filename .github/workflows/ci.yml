name: CI

# 品質ゲート: PR と(main 以外への)push で検証する。
#   main への push は deploy.yml(版ゲート)側で扱う。
#   ここが通らない変更は main にマージしない運用にする(ブランチ保護推奨)。

on:
  pull_request:
  push:
    branches-ignore: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: xiaovy.tvapp.web
    env:
      # ビルド検証用。未設定でもビルドは通る(実行時のみ必要な公開値のため)。
      NEXT_PUBLIC_FIREBASE_API_KEY: ${{ vars.NEXT_PUBLIC_FIREBASE_API_KEY }}
      NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ vars.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}
      NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${{ vars.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
      NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ vars.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}
      NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ vars.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
      NEXT_PUBLIC_FIREBASE_APP_ID: ${{ vars.NEXT_PUBLIC_FIREBASE_APP_ID }}
      NEXT_PUBLIC_IDTOKEN_NAME: ${{ vars.NEXT_PUBLIC_IDTOKEN_NAME }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: xiaovy.tvapp.web/package-lock.json

      - name: 依存インストール
        run: npm ci

      - name: 型検査
        run: npx tsc --noEmit

      # 注: Next 16 で `next lint` は廃止。ESLint 直接運用の整備までは
      # tsc + test + build + cf:build で品質を担保する。
      - name: テスト(ユニット)
        run: npm test

      - name: 本番ビルド(Next)
        run: npm run build

      - name: OpenNext ビルド(Workers バンドル生成確認)
        run: npm run cf:build
