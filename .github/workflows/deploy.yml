name: Deploy (version-gated)

# 版ゲート方式のデプロイ:
#   main への push(=PRマージ)時に、アプリ(xiaovy.tvapp.web)の package.json の
#   version が直前コミットから上がっている場合「だけ」Cloudflare Workers へデプロイする。
#   version を上げない変更はデプロイされない(AGENTS-SHARED §4「版ゲート」)。
#   デプロイ成功後、版タグ v x.y.z に紐づく GitHub Release へ提案スライド(発表・説明用の
#   自己完結HTML)をアーティファクトとして添付する(デプロイ物には含めない)。

on:
  push:
    branches: [main]

# 同一 main への多重デプロイを直列化(古い実行はキャンセル)
concurrency:
  group: deploy-main
  cancel-in-progress: false

permissions:
  contents: write # 版タグ(v x.y.z)の付与に使用

jobs:
  # --- 版ゲート: package.json の version が上がったかを判定 ---
  gate:
    runs-on: ubuntu-latest
    outputs:
      deploy: ${{ steps.check.outputs.deploy }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2 # 直前コミットとの差分を見るため

      - id: check
        name: バージョン変化を判定
        run: |
          APP=xiaovy.tvapp.web
          CUR=$(node -p "require('./$APP/package.json').version")
          PREV=$(git show HEAD~1:$APP/package.json 2>/dev/null \
                 | node -e "let s='';process.stdin.on('data',d=>s+=d).on('end',()=>{try{console.log(JSON.parse(s).version)}catch{console.log('none')}})" \
                 || echo "none")
          echo "現在: $CUR / 直前: $PREV"
          echo "version=$CUR" >> "$GITHUB_OUTPUT"
          if [ "$CUR" != "$PREV" ]; then
            echo "deploy=true" >> "$GITHUB_OUTPUT"
            echo "::notice::version が $PREV → $CUR に上がったためデプロイします"
          else
            echo "deploy=false" >> "$GITHUB_OUTPUT"
            echo "::notice::version 変化なし($CUR)。デプロイをスキップします"
          fi

  # --- デプロイ本体(版が上がったときだけ実行) ---
  deploy:
    needs: gate
    if: needs.gate.outputs.deploy == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: xiaovy.tvapp.web
    env:
      # ビルド時に埋め込む公開 Firebase 設定(GitHub の Variables から注入)
      NEXT_PUBLIC_FIREBASE_API_KEY: ${{ vars.NEXT_PUBLIC_FIREBASE_API_KEY }}
      NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ vars.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}
      NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${{ vars.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
      NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ vars.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}
      NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ vars.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
      NEXT_PUBLIC_FIREBASE_APP_ID: ${{ vars.NEXT_PUBLIC_FIREBASE_APP_ID }}
      NEXT_PUBLIC_IDTOKEN_NAME: ${{ vars.NEXT_PUBLIC_IDTOKEN_NAME }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: xiaovy.tvapp.web/package-lock.json

      - name: 依存インストール
        run: npm ci

      - name: テスト + カバレッジ(80%未満はデプロイしない)
        run: npm run test:coverage

      - name: OpenNext ビルド
        run: npm run cf:build

      - name: Cloudflare Workers へデプロイ
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        # BUILD_SHA を埋め込み、/api/health で本番の反映コミットを検証可能にする
        run: npx wrangler deploy --var BUILD_SHA:"$(git rev-parse --short HEAD)"

      - name: 版タグを付与(v x.y.z)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="v${{ needs.gate.outputs.version }}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "タグ $TAG は既存。スキップ"
          else
            git tag "$TAG"
            git push origin "$TAG"
          fi

      # 提案スライド(発表資料)を Release アーティファクトとして出力する。
      #   - Cloudflare デプロイ物(.open-next)には含めない。あくまで版タグに紐づく「説明用マニュアル」。
      #   - スライドは自己完結の 1 ファイル HTML(docs/slides/tvapp-overview.html)。
      - name: 提案スライドを Release アーティファクトとして添付
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="v${{ needs.gate.outputs.version }}"
          SLIDE="docs/slides/tvapp-overview.html"   # working-directory=xiaovy.tvapp.web からの相対
          if [ ! -f "$SLIDE" ]; then
            echo "::warning::$SLIDE が見つからないため Release 添付をスキップします"
            exit 0
          fi
          # 版が分かる資料名で添付(ダウンロードしてそのままブラウザで開ける)
          ASSET="tvapp-overview-$TAG.html"
          cp "$SLIDE" "$ASSET"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG は既存。スライドを更新添付します"
            gh release upload "$TAG" "$ASSET" --clobber
          else
            echo "Release $TAG を作成し、スライドを添付します"
            gh release create "$TAG" "$ASSET" \
              --title "TVapp $TAG" \
              --notes "TVapp 提案スライド(発表・説明用資料)。自己完結の 1 ファイル HTML。ダウンロードしてブラウザで開くと閲覧できます。本資料は Cloudflare デプロイ物には含まれません。"
          fi
