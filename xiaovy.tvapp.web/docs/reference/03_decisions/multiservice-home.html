<!DOCTYPE html>
<html lang="ja" data-svc="tver">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TVapp — 統合ビューア ホーム(TVER / ABEMA / YouTube / niconico 切替モック)</title>
<!--
  TVapp 統合ビューア ホーム — マルチサービス・テーマ切替モック
  対象: tvapp-web / docs/reference/03_decisions
  骨格は 4 サービス共通、data-svc 属性でアクセント・雰囲気・コンテンツが切り替わる。
  自己完結(外部 CSS / CDN / JS フレームワーク不使用)。番組・チャンネル・人物はすべて架空。
-->
<style>
/* ============================================================
   0. リセット & 共通トークン
   ============================================================ */
*{margin:0;padding:0;box-sizing:border-box}
html{-webkit-text-size-adjust:100%}
body{
  font-family:"Hiragino Sans","Noto Sans JP","Segoe UI",sans-serif;
  font-feature-settings:"palt" 1;
  line-height:1.7;letter-spacing:.02em;
  background:var(--bg);color:var(--tx);
  -webkit-font-smoothing:antialiased;
  transition:background-color .5s ease,color .5s ease;
  overflow-x:hidden;
}
a{color:inherit;text-decoration:none}
button{font:inherit;color:inherit;background:none;border:none;cursor:pointer}
input{font:inherit}
ul{list-style:none}
img,svg{display:block}
[hidden]{display:none!important}
:focus-visible{outline:2px solid var(--acc);outline-offset:3px;border-radius:6px}
.vh{position:absolute;width:1px;height:1px;margin:-1px;overflow:hidden;clip:rect(0 0 0 0);white-space:nowrap}
.skip{
  position:fixed;left:14px;top:-60px;z-index:300;
  background:var(--acc);color:var(--acc-ink);font-size:12.5px;font-weight:700;
  padding:8px 16px;border-radius:8px;transition:top .2s ease;
}
.skip:focus-visible{top:12px}

/* ============================================================
   1. サービス別テーマ変数(data-svc で切替)
   ============================================================ */
:root,
[data-svc="tver"]{
  --bg:#06080f; --bg-up:#0b0e18;
  --panel:rgba(255,255,255,.05); --panel-up:rgba(255,255,255,.09);
  --line:rgba(255,255,255,.1); --line-soft:rgba(255,255,255,.06);
  --tx:#e9edf5; --tx2:#8e98ac; --tx3:#677184;
  --acc:#e9b862; --acc2:#c8912e; --acc-ink:#251604;
  --acc-soft:rgba(233,184,98,.13); --glow:rgba(233,184,98,.32);
  --r:10px; --r-lg:14px;
  --dock:rgba(9,12,20,.82);
}
[data-svc="abema"]{
  --bg:#030a08; --bg-up:#071410;
  --panel:rgba(120,255,190,.05); --panel-up:rgba(120,255,190,.1);
  --line:rgba(120,255,190,.14); --line-soft:rgba(120,255,190,.07);
  --tx:#e7f5ee; --tx2:#8aa79a; --tx3:#5f7d70;
  --acc:#1fe887; --acc2:#00b868; --acc-ink:#02170c;
  --acc-soft:rgba(31,232,135,.12); --glow:rgba(31,232,135,.3);
  --r:8px; --r-lg:12px;
  --dock:rgba(4,13,10,.84);
}
[data-svc="youtube"]{
  --bg:#0f0f0f; --bg-up:#181818;
  --panel:#1e1e1e; --panel-up:#2a2a2a;
  --line:#303030; --line-soft:#262626;
  --tx:#f1f1f1; --tx2:#a3a3a3; --tx3:#7c7c7c;
  --acc:#ff4d4d; --acc2:#e02b2b; --acc-ink:#ffffff;
  --acc-soft:rgba(255,77,77,.12); --glow:rgba(255,77,77,.3);
  --r:14px; --r-lg:18px;
  --dock:rgba(18,18,18,.88);
}
[data-svc="niconico"]{
  --bg:#16100a; --bg-up:#1f160d;
  --panel:rgba(255,190,110,.06); --panel-up:rgba(255,190,110,.12);
  --line:rgba(255,190,110,.16); --line-soft:rgba(255,190,110,.08);
  --tx:#f4ede1; --tx2:#af9f89; --tx3:#83745e;
  --acc:#ff9327; --acc2:#ef7404; --acc-ink:#2b1602;
  --acc-soft:rgba(255,147,39,.13); --glow:rgba(255,147,39,.32);
  --r:12px; --r-lg:16px;
  --dock:rgba(23,16,9,.86);
}

/* 空気(サービスごとの背景グロー。クロスフェード) */
.atmo{position:fixed;inset:0;z-index:-1;pointer-events:none}
.atmo span{position:absolute;inset:0;opacity:0;transition:opacity .7s ease}
.atmo .a-tver{background:
  radial-gradient(900px 480px at 72% -160px,rgba(46,84,140,.38),transparent 70%),
  radial-gradient(700px 420px at 8% 30%,rgba(233,184,98,.06),transparent 65%)}
.atmo .a-abema{background:
  radial-gradient(900px 500px at 78% -140px,rgba(31,232,135,.14),transparent 68%),
  radial-gradient(760px 460px at 4% 42%,rgba(0,150,120,.12),transparent 62%),
  repeating-linear-gradient(115deg,transparent 0 90px,rgba(31,232,135,.016) 90px 120px)}
.atmo .a-youtube{background:
  radial-gradient(820px 440px at 78% -160px,rgba(255,77,77,.1),transparent 66%),
  linear-gradient(180deg,#141414,transparent 320px)}
.atmo .a-niconico{background:
  radial-gradient(880px 480px at 74% -150px,rgba(255,147,39,.14),transparent 68%),
  radial-gradient(4px 4px at 50% 50%,transparent,transparent),
  radial-gradient(rgba(255,190,110,.05) 1px,transparent 1.4px)}
.atmo .a-niconico{background-size:auto,auto,26px 26px}
[data-svc="tver"] .atmo .a-tver,
[data-svc="abema"] .atmo .a-abema,
[data-svc="youtube"] .atmo .a-youtube,
[data-svc="niconico"] .atmo .a-niconico{opacity:1}

.wrap{max-width:1280px;margin:0 auto;padding:0 28px}
@media(max-width:640px){.wrap{padding:0 16px}}

/* ============================================================
   2. トップバー(ロゴ / 検索 / ユーザー)
   ============================================================ */
.top{border-bottom:1px solid var(--line-soft)}
.bar{display:flex;align-items:center;gap:20px;padding:13px 0}
.logo{display:flex;align-items:center;gap:10px;flex:0 0 auto}
.lg-tile{fill:var(--acc);transition:fill .5s ease}
.lg-w{stroke:var(--acc-ink);stroke-width:2.4;fill:none;stroke-linecap:round;transition:stroke .5s ease}
.wm{
  font-family:"Avenir Next","Segoe UI",sans-serif;
  font-size:21px;font-weight:800;letter-spacing:.015em;line-height:1;color:var(--tx);
}
.wm-sub{
  display:block;font-family:"Avenir Next Condensed","Arial Narrow",sans-serif;
  font-size:8.5px;font-weight:600;letter-spacing:.34em;color:var(--tx3);
  text-transform:uppercase;margin-top:3px;
}
.search{flex:1 1 160px;min-width:0;max-width:480px;position:relative;margin:0 auto}
.search svg{position:absolute;left:14px;top:50%;transform:translateY(-50%);stroke:var(--tx3);pointer-events:none}
.search input{
  width:100%;border:1px solid var(--line);border-radius:999px;
  background:var(--panel);color:var(--tx);
  padding:9px 18px 9px 42px;font-size:13px;line-height:1.4;
  transition:border-color .2s ease,background .2s ease,box-shadow .2s ease;
}
.search input::placeholder{color:var(--tx3)}
.search input:focus{outline:none;border-color:var(--acc);background:var(--bg-up);box-shadow:0 0 0 3px var(--acc-soft)}
.hact{display:flex;align-items:center;gap:10px;flex:0 0 auto;margin-left:auto}
.icb{display:grid;place-items:center;width:38px;height:38px;border-radius:50%;color:var(--tx2);transition:background .18s ease,color .18s ease}
.icb:hover{background:var(--panel-up);color:var(--tx)}
.uwrap{position:relative}
.user{
  display:flex;align-items:center;gap:9px;border-radius:999px;
  padding:4px 12px 4px 4px;border:1px solid var(--line);background:var(--panel);color:var(--tx);
  transition:background .18s ease,border-color .18s ease;
}
.user:hover{background:var(--panel-up);border-color:var(--acc)}
.avt{
  display:grid;place-items:center;width:32px;height:32px;border-radius:50%;
  font-size:14px;font-weight:700;flex:0 0 auto;
  background:linear-gradient(155deg,var(--acc),var(--acc2));color:var(--acc-ink);
  transition:background .5s ease;
}
.unm{font-size:13px;font-weight:600;white-space:nowrap}
.user svg{transition:transform .2s ease}
.user[aria-expanded="true"] svg{transform:rotate(180deg)}
.umenu{
  position:absolute;right:0;top:calc(100% + 10px);z-index:210;
  min-width:230px;padding:6px;
  background:var(--bg-up);border:1px solid var(--line);border-radius:14px;
  box-shadow:0 18px 50px rgba(0,0,0,.55);
  animation:menuIn .16s ease both;
}
@keyframes menuIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:none}}
.uhead{padding:10px 14px 9px;border-bottom:1px solid var(--line-soft);margin-bottom:5px}
.uhead b{display:block;font-size:13.5px}
.uhead span{font-size:11px;color:var(--tx3)}
.umenu a{
  display:flex;align-items:center;gap:10px;
  padding:8px 12px;border-radius:9px;font-size:13px;color:var(--tx2);
  transition:background .15s ease,color .15s ease;
}
.umenu a:hover{background:var(--panel-up);color:var(--tx)}
.umenu a svg{stroke:currentColor;flex:0 0 auto}
.umenu .out{color:var(--acc)}
@media(max-width:760px){.unm{display:none}.user{padding-right:9px}}
@media(max-width:470px){.bar{gap:10px}.icb{display:none}.search input{padding-left:36px;font-size:12.5px}.search svg{left:12px}}

/* ============================================================
   3. サービス切替ドック(このアプリの主役)
   ============================================================ */
.dockbar{
  position:sticky;top:0;z-index:200;
  background:var(--dock);
  backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  border-bottom:1px solid var(--line-soft);
  transition:background-color .5s ease;
}
.dock-in{max-width:1280px;margin:0 auto;padding:10px 28px;display:flex;align-items:center;gap:18px}
.dock-k{
  flex:0 0 auto;
  font-family:"Avenir Next Condensed","Arial Narrow",sans-serif;
  font-size:10px;font-weight:600;letter-spacing:.3em;color:var(--tx3);
  text-transform:uppercase;writing-mode:horizontal-tb;
  border-right:1px solid var(--line);padding-right:16px;line-height:1.5;
}
.dock{
  position:relative;flex:1 1 auto;max-width:780px;
  display:flex;gap:4px;padding:5px;
  background:var(--panel);border:1px solid var(--line);border-radius:16px;
}
.ind{
  position:absolute;top:5px;bottom:5px;left:0;width:0;z-index:0;
  border-radius:12px;
  background:linear-gradient(160deg,var(--acc),var(--acc2));
  box-shadow:0 6px 22px var(--glow),inset 0 1px 0 rgba(255,255,255,.28);
  transition:transform .34s cubic-bezier(.55,.1,.25,1.2),width .34s cubic-bezier(.55,.1,.25,1.2),background .5s ease;
}
.svc{
  position:relative;z-index:1;flex:1 1 0;min-width:0;
  display:flex;align-items:center;justify-content:center;gap:9px;
  padding:9px 10px;border-radius:12px;color:var(--tx2);
  transition:color .25s ease;
}
.svc:hover{color:var(--tx)}
.svc[aria-selected="true"]{color:var(--acc-ink)}
.svc svg{flex:0 0 auto;transition:transform .3s ease}
.svc[aria-selected="true"] svg{transform:scale(1.12)}
.svc-tx{display:flex;flex-direction:column;align-items:flex-start;line-height:1.25;min-width:0}
.svc-n{font-size:14.5px;font-weight:800;letter-spacing:.03em;white-space:nowrap}
.svc-d{font-size:9.5px;font-weight:600;letter-spacing:.06em;opacity:.72;white-space:nowrap}
.dock-live{
  flex:0 0 auto;display:flex;align-items:center;gap:7px;
  font-size:11px;font-weight:700;color:var(--tx2);white-space:nowrap;
}
.dock-live i{
  width:7px;height:7px;border-radius:50%;background:var(--acc);
  box-shadow:0 0 10px var(--glow);animation:pulse 1.8s ease infinite;
}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
@media(max-width:1020px){.dock-k,.dock-live{display:none}.dock{max-width:none}}
@media(max-width:720px){
  .dock-in{padding:8px 12px}
  .svc{flex-direction:column;gap:3px;padding:7px 4px}
  .svc-tx{align-items:center}
  .svc-n{font-size:11px}
  .svc-d{display:none}
  .svc svg{width:18px;height:18px}
}

/* ============================================================
   4. フレーバー枠(サービス固有の帯: ABEMA ティッカー / YouTube チップ)
   ============================================================ */
.tick{background:var(--bg-up);border-bottom:1px solid var(--line-soft);overflow:hidden}
.tick-in{display:flex;width:max-content;animation:tick 30s linear infinite}
.tick-seq{display:flex;align-items:center;gap:42px;padding:8px 21px;white-space:nowrap;font-size:12px;font-weight:600;color:var(--tx2)}
.tick-seq b{
  color:var(--acc-ink);background:var(--acc);border-radius:5px;
  padding:0 8px;margin-right:8px;font-size:10.5px;font-weight:800;letter-spacing:.08em;
}
@keyframes tick{from{transform:translateX(0)}to{transform:translateX(-50%)}}
.chips{display:flex;gap:9px;overflow-x:auto;padding:14px 28px 4px;max-width:1280px;margin:0 auto;scrollbar-width:none}
.chips::-webkit-scrollbar{display:none}
.chips button{
  flex:0 0 auto;font-size:12.5px;font-weight:600;
  padding:6px 15px;border-radius:9px;
  background:var(--panel);border:1px solid var(--line-soft);color:var(--tx2);
  transition:background .15s ease,color .15s ease;
}
.chips button:hover{background:var(--panel-up);color:var(--tx)}
.chips button[aria-pressed="true"]{background:var(--tx);color:var(--bg);border-color:var(--tx)}
@media(max-width:640px){.chips{padding:12px 16px 2px}}

/* ============================================================
   5. ジャンルナビ
   ============================================================ */
.gnav{display:flex;gap:6px;overflow-x:auto;padding:13px 0 4px;scrollbar-width:none}
.gnav::-webkit-scrollbar{display:none}
.gnav a{
  flex:0 0 auto;font-size:13px;font-weight:600;
  padding:6px 16px;border-radius:999px;color:var(--tx2);
  border:1px solid transparent;
  transition:background .16s ease,color .16s ease,border-color .16s ease;
}
.gnav a:hover{background:var(--panel);color:var(--tx)}
.gnav a[aria-current="page"]{background:var(--acc-soft);border-color:var(--acc);color:var(--acc)}
[data-svc="youtube"] .gnav a[aria-current="page"]{background:var(--tx);border-color:var(--tx);color:var(--bg)}

/* ============================================================
   6. ヒーロー
   ============================================================ */
.hero{position:relative;min-height:440px;display:flex;align-items:flex-end;overflow:hidden;isolation:isolate}
.hero-art{position:absolute;inset:0;z-index:-2}
[data-svc="tver"] .hero-art{background:
  linear-gradient(90deg,var(--bg) 4%,rgba(6,8,15,.6) 44%,rgba(6,8,15,0) 74%),
  linear-gradient(0deg,var(--bg) 2%,rgba(6,8,15,0) 46%),
  radial-gradient(70% 100% at 78% 6%,rgba(126,206,244,.32),transparent 58%),
  linear-gradient(140deg,#0e5470 0%,#187ba0 34%,#0b3057 68%,#06182c 100%)}
[data-svc="tver"] .hero-art::after{content:"";position:absolute;inset:0;background:repeating-linear-gradient(0deg,rgba(255,255,255,.016) 0 1px,transparent 1px 3px)}
[data-svc="abema"] .hero-art{background:
  linear-gradient(90deg,var(--bg) 4%,rgba(3,10,8,.58) 46%,rgba(3,10,8,0) 76%),
  linear-gradient(0deg,var(--bg) 2%,rgba(3,10,8,0) 44%),
  repeating-linear-gradient(115deg,transparent 0 70px,rgba(31,232,135,.05) 70px 74px),
  radial-gradient(64% 100% at 80% 0%,rgba(31,232,135,.3),transparent 56%),
  linear-gradient(140deg,#04321e 0%,#0a5c38 32%,#03281c 66%,#020d08 100%)}
[data-svc="youtube"] .hero-art{background:
  linear-gradient(90deg,var(--bg) 4%,rgba(15,15,15,.62) 46%,rgba(15,15,15,0) 76%),
  linear-gradient(0deg,var(--bg) 2%,rgba(15,15,15,0) 44%),
  radial-gradient(60% 96% at 80% 4%,rgba(255,77,77,.34),transparent 58%),
  linear-gradient(140deg,#3a1114 0%,#701a22 34%,#26090c 70%,#120608 100%)}
[data-svc="niconico"] .hero-art{background:
  linear-gradient(90deg,var(--bg) 4%,rgba(22,16,10,.6) 46%,rgba(22,16,10,0) 76%),
  linear-gradient(0deg,var(--bg) 2%,rgba(22,16,10,0) 44%),
  radial-gradient(62% 98% at 78% 2%,rgba(57,208,196,.24),transparent 56%),
  linear-gradient(140deg,#6e3608 0%,#b0620e 34%,#4c2606 68%,#1c0f05 100%)}
.hero-deco{
  position:absolute;right:-10px;bottom:16px;z-index:-1;
  font-family:Georgia,"Times New Roman",serif;font-style:italic;font-weight:700;
  font-size:120px;line-height:1;letter-spacing:.04em;color:rgba(255,255,255,.05);
  user-select:none;white-space:nowrap;pointer-events:none;
}
[data-svc="abema"] .hero-deco{font-family:"Avenir Next Condensed","Arial Narrow",sans-serif;font-style:normal;letter-spacing:.14em}
/* niconico: 流れるコメント */
.flow{position:absolute;inset:0;z-index:-1;overflow:hidden;display:none;pointer-events:none}
[data-svc="niconico"] .flow{display:block}
.flow p{
  position:absolute;left:0;width:max-content;white-space:nowrap;
  font-size:15px;font-weight:700;color:rgba(255,255,255,.5);
  text-shadow:0 1px 6px rgba(0,0,0,.5);
  animation:flow linear infinite;
}
.flow p:nth-child(1){top:11%;animation-duration:26s}
.flow p:nth-child(2){top:26%;animation-duration:34s;animation-delay:-14s;font-size:13px;color:rgba(255,255,255,.34)}
.flow p:nth-child(3){top:42%;animation-duration:29s;animation-delay:-7s;font-size:14px;color:rgba(255,255,255,.42)}
.flow p span{margin-right:64px}
@keyframes flow{from{transform:translateX(100vw)}to{transform:translateX(-100%)}}
.hero-in{position:relative;z-index:1;width:100%;padding:104px 0 52px}
.hero-badge{
  display:inline-flex;align-items:center;gap:7px;
  font-size:11px;font-weight:800;letter-spacing:.1em;
  background:var(--acc);color:var(--acc-ink);
  border-radius:6px;padding:3px 12px;margin-bottom:12px;
  box-shadow:0 6px 20px var(--glow);
  animation:heroUp .55s ease both;
}
.hero-badge i{width:7px;height:7px;border-radius:50%;background:currentColor;animation:pulse 1.6s ease infinite}
.hero-k{font-size:12px;font-weight:700;letter-spacing:.2em;color:var(--acc);animation:heroUp .55s .05s ease both}
.hero h1{
  font-size:clamp(27px,3.6vw,44px);font-weight:800;line-height:1.28;color:var(--tx);
  margin:8px 0 10px;max-width:21em;text-shadow:0 4px 30px rgba(0,0,0,.45);
  text-wrap:balance;animation:heroUp .55s .1s ease both;
}
.hero-cp{font-size:14px;color:var(--tx2);max-width:37em;margin-bottom:16px;animation:heroUp .55s .16s ease both}
.hero-meta{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:24px;animation:heroUp .55s .22s ease both}
.hero-meta li{
  font-size:11.5px;font-weight:600;padding:3px 12px;border-radius:999px;
  color:var(--tx);border:1px solid var(--line);background:rgba(0,0,0,.3);
}
.hero-cta{display:flex;flex-wrap:wrap;gap:12px;animation:heroUp .55s .28s ease both}
@keyframes heroUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
.btn{
  display:inline-flex;align-items:center;gap:9px;
  font-size:14px;font-weight:700;padding:11px 26px;border-radius:var(--r);
  transition:transform .18s ease,box-shadow .18s ease,filter .18s ease,background .18s ease;
}
.btn-p{background:linear-gradient(160deg,var(--acc),var(--acc2));color:var(--acc-ink);box-shadow:0 8px 28px var(--glow)}
.btn-p:hover{filter:brightness(1.08);transform:translateY(-1px)}
.btn-g{background:rgba(255,255,255,.08);border:1px solid var(--line);color:var(--tx)}
.btn-g:hover{background:rgba(255,255,255,.15);transform:translateY(-1px)}
@media(max-width:760px){.hero{min-height:380px}.hero-in{padding-top:72px}.hero-deco{font-size:64px}}

/* ============================================================
   7. ランキングセクション & カード
   ============================================================ */
.sec{margin:38px 0}
.sech{display:flex;align-items:baseline;gap:14px;margin-bottom:12px}
.sech h2{font-size:20px;font-weight:800;line-height:1.3;color:var(--tx);display:flex;align-items:center;gap:11px}
.sech h2::before{content:"";width:4px;height:19px;border-radius:2px;background:linear-gradient(180deg,var(--acc),var(--acc2));flex:0 0 auto;transition:background .5s ease}
[data-svc="abema"] .sech h2::before{transform:skewX(-12deg);width:7px;border-radius:2px}
[data-svc="youtube"] .sech h2::before{display:none}
[data-svc="niconico"] .sech h2::before{width:11px;height:11px;border-radius:3px;transform:rotate(45deg);align-self:center}
.sech .cnt{
  font-family:"Avenir Next Condensed","Arial Narrow",sans-serif;
  font-size:11px;font-weight:600;letter-spacing:.22em;color:var(--tx3);align-self:center;
}
.more{
  margin-left:auto;display:inline-flex;align-items:center;gap:5px;

  var cards = sec.items.map(cardHTML).join("");
  return '<section class="sec" aria-label="' + esc(sec.t) + '">' +
    '<div class="sech"><h2>' + esc(sec.t) + '</h2><span class="cnt">TOP 6</span>' +
      '<a class="more" href="#">もっと見る<svg width="12" height="12" viewBox="0 0 12 12" fill="none" aria-hidden="true"><path d="M4.5 2.5 8 6l-3.5 3.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg></a>' +
    '</div><div class="row">' + cards + '</div></section>';
}

/* ---------- ヒーロー ---------- */
function heroHTML(h){
  var badge = h.badge
    ? '<span class="hero-badge">' + (h.live ? '<i aria-hidden="true"></i>' : "") + esc(h.badge) + '</span>'
    : "";
  var meta = h.meta.map(function(m){ return "<li>" + esc(m) + "</li>"; }).join("");
  return badge +
    '<p class="hero-k">' + esc(h.k) + '</p>' +
    '<h1>' + esc(h.title) + '</h1>' +
    '<p class="hero-cp">' + esc(h.cp) + '</p>' +
    '<ul class="hero-meta">' + meta + '</ul>' +
    '<div class="hero-cta">' +
      '<a class="btn btn-p" href="#"><svg width="13" height="13" viewBox="0 0 14 14" aria-hidden="true"><path d="M3 1.8v10.4L12 7 3 1.8Z" fill="currentColor"/></svg>' + esc(h.cta1) + '</a>' +
      '<a class="btn btn-g" href="#"><svg width="13" height="13" viewBox="0 0 14 14" fill="none" aria-hidden="true"><path d="M7 2v10M2 7h10" stroke="currentColor" stroke-width="1.9" stroke-linecap="round"/></svg>' + esc(h.cta2) + '</a>' +
    '</div>';
}

/* ---------- フレーバー帯 ---------- */
function flavorHTML(f){
  if (!f) return "";
  if (f.type === "tick") {
    var seq = f.items.map(function(it){
      return "<span><b>" + esc(it[0]) + "</b>" + esc(it[1]) + "</span>";
    }).join("");
    var row = '<div class="tick-seq">' + seq + '</div>';
    return '<div class="tick" aria-hidden="true"><div class="tick-in">' + row + row + '</div></div>';
  }
  if (f.type === "chips") {
    var chips = f.items.map(function(c, i){
      return '<button aria-pressed="' + (i === 0 ? "true" : "false") + '">' + esc(c) + "</button>";
    }).join("");
    return '<div class="chips" role="group" aria-label="フィルタ">' + chips + '</div>';
  }
  return "";
}

/* ---------- 描画 ---------- */
function render(svc){
  var d = DATA[svc];
  root.setAttribute("data-svc", svc);
  document.getElementById("q").placeholder = d.searchPh;
  document.getElementById("docklive-t").textContent = d.dockLive;
  document.getElementById("flavor").innerHTML = flavorHTML(d.flavor);
  document.getElementById("gnav").innerHTML = d.nav.map(function(n, i){
    return '<a href="#"' + (i === 0 ? ' aria-current="page"' : "") + ">" + esc(n) + "</a>";
  }).join("");
  document.getElementById("hero-in").innerHTML = heroHTML(d.hero);
  document.getElementById("hero-deco").textContent = d.hero.deco || "";
  var flow = document.getElementById("flow");
  if (d.flow) {
    flow.innerHTML = d.flow.map(function(line){
      return "<p>" + line.split("|").map(function(c){ return "<span>" + esc(c) + "</span>"; }).join("") + "</p>";
    }).join("");
  } else {
    flow.innerHTML = "";
  }
  document.getElementById("main").innerHTML = d.secs.map(secHTML).join("");
}

function placeInd(){
  var active = tabs.filter(function(t){ return t.getAttribute("aria-selected") === "true"; })[0];
  if (!active) return;
  ind.style.width = active.offsetWidth + "px";
  ind.style.transform = "translateX(" + active.offsetLeft + "px)";
}

function select(svc, focusTab){
  if (!DATA[svc] || svc === current) { placeInd(); return; }
  var first = current === null;
  current = svc;
  tabs.forEach(function(t){
    var on = t.getAttribute("data-svc") === svc;
    t.setAttribute("aria-selected", on ? "true" : "false");
    t.tabIndex = on ? 0 : -1;
    if (on && focusTab) t.focus();
  });
  var apply = function(){
    render(svc);
    placeInd();
    stage.classList.remove("sw");
    document.getElementById("announce").textContent = DATA[svc].name + " に切り替えました";
  };
  if (first || reduced) {
    apply();
  } else {
    stage.classList.add("sw");
    placeInd();
    window.setTimeout(apply, 190);
  }
  try {
    localStorage.setItem("tvapp-svc", svc);
    history.replaceState(null, "", "#" + svc);
  } catch (e) { /* file:// 等では無視 */ }
}

/* ---------- イベント ---------- */
tabs.forEach(function(t){
  t.addEventListener("click", function(){ select(t.getAttribute("data-svc")); });
  t.addEventListener("keydown", function(e){
    var i = tabs.indexOf(t), n = null;
    if (e.key === "ArrowRight") n = (i + 1) % tabs.length;
    if (e.key === "ArrowLeft") n = (i - 1 + tabs.length) % tabs.length;
    if (n !== null) {
      e.preventDefault();
      select(tabs[n].getAttribute("data-svc"), true);
    }
  });
});
document.addEventListener("keydown", function(e){
  var el = document.activeElement;
  if (el && /^(INPUT|TEXTAREA|SELECT)$/.test(el.tagName)) return;
  var i = ["1","2","3","4"].indexOf(e.key);
  if (i >= 0) select(ORDER[i]);
});
window.addEventListener("resize", placeInd);

/* ユーザーメニュー */
var ubtn = document.getElementById("ubtn");
var umenu = document.getElementById("umenu");
function closeMenu(){ umenu.hidden = true; ubtn.setAttribute("aria-expanded", "false"); }
ubtn.addEventListener("click", function(e){
  e.stopPropagation();
  var open = umenu.hidden;
  umenu.hidden = !open;
  ubtn.setAttribute("aria-expanded", open ? "true" : "false");
});
document.addEventListener("click", function(e){
  if (!umenu.hidden && !umenu.contains(e.target)) closeMenu();
});
document.addEventListener("keydown", function(e){
  if (e.key === "Escape" && !umenu.hidden) { closeMenu(); ubtn.focus(); }
});

/* フィルタチップ(YouTube テーマ内)のトグル */
document.getElementById("flavor").addEventListener("click", function(e){
  var b = e.target.closest ? e.target.closest("button[aria-pressed]") : null;
  if (!b) return;
  this.querySelectorAll("button[aria-pressed]").forEach(function(x){ x.setAttribute("aria-pressed", "false"); });
  b.setAttribute("aria-pressed", "true");
});

/* ダミーリンク保護 */
document.addEventListener("click", function(e){
  var a = e.target && e.target.closest ? e.target.closest('a[href="#"]') : null;
  if (a) e.preventDefault();
});

/* ---------- 初期化 ---------- */
var initial = (location.hash || "").replace("#", "");
if (!DATA[initial]) {
  try { initial = localStorage.getItem("tvapp-svc") || ""; } catch (e) { initial = ""; }
}
if (!DATA[initial]) initial = "tver";
select(initial);
window.setTimeout(placeInd, 60); /* フォント確定後に再配置 */
})();
</script>
