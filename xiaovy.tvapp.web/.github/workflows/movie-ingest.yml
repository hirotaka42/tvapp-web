# Required repository secrets:
# - CINEMA_INGEST_ENDPOINT: deployed /api/service/cinema/ingest URL
# - CINEMA_INGEST_SECRET: value matched by the Worker INGEST_SECRET binding
name: Movie ingest

on:
  schedule:
    - cron: '17 21 * * *'
  workflow_dispatch:

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: movie-crawler/package-lock.json
      - name: Install crawler dependencies
        working-directory: movie-crawler
        run: npm ci
      - name: Crawl and post ingest payload
        working-directory: movie-crawler
        env:
          CINEMA_INGEST_ENDPOINT: ${{ secrets.CINEMA_INGEST_ENDPOINT }}
          INGEST_SECRET: ${{ secrets.CINEMA_INGEST_SECRET }}
        run: node crawl.mjs --mode=post --endpoint "$CINEMA_INGEST_ENDPOINT" --secret-env=INGEST_SECRET
